name: CI-CD FastAPI ML model to Azure ACR and ACI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# ── Edita estos valores para que coincidan con tu entorno Azure ──────────────
env:
  IMAGE_NAME: iris-api
  CONTAINER_NAME: aci-entregable4b
  ACR_NAME: acrentregable4b202606
  RESOURCE_GROUP: rg-entregable4b-github
  DNS_LABEL: aci-entregable4b
  LOCATION: westeurope
  PORT: 8000
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-test-push-deploy:
    name: Build, test, push and deploy to ACI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Train model
        run: |
          python app/train_model.py
          test -f app/model/iris_model.joblib

      - name: Run tests
        run: python -m pytest -q

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:local .

      - name: Smoke test (contenedor local)
        run: |
          docker run -d --name iris-smoke -p ${{ env.PORT }}:${{ env.PORT }} ${{ env.IMAGE_NAME }}:local
          for i in {1..20}; do
            if curl --fail http://localhost:${{ env.PORT }}/health; then
              docker rm -f iris-smoke
              exit 0
            fi
            echo "Intento $i/20..."
            sleep 3
          done
          docker rm -f iris-smoke
          echo "Smoke test fallido: la API no arrancó"
          exit 1

      - name: Push a Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker tag ${{ env.IMAGE_NAME }}:local "$IMAGE"
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy a Azure Container Instances
        run: |
          az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes 2>/dev/null || true

          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --image "${{ env.IMAGE }}" \
            --registry-login-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username $(az acr credential show -n ${{ env.ACR_NAME }} --query username -o tsv) \
            --registry-password $(az acr credential show -n ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv) \
            --dns-name-label ${{ env.DNS_LABEL }} \
            --ports ${{ env.PORT }} \
            --location ${{ env.LOCATION }} \
            --cpu 1 --memory 1 \
            --os-type Linux \
            --restart-policy Always

      - name: Verificar endpoint ACI desplegado
        run: |
          URL="http://${{ env.DNS_LABEL }}.${{ env.LOCATION }}.azurecontainer.io:${{ env.PORT }}"
          echo "Verificando $URL/health ..."
          for i in {1..30}; do
            if curl --fail "$URL/health"; then
              echo "API desplegada correctamente"
              exit 0
            fi
            echo "Intento $i/30..."
            sleep 10
          done
          echo "ERROR: la API no respondió a tiempo en ACI"
          exit 1
